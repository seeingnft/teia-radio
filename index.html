<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Teia Radio</title>
<meta name="description" content="A listening instrument tuned to the audio OBJKTs living on Teia.">
<meta name="theme-color" content="#F4F2EC">
<style>
:root{
  --bg:#F4F2EC; --panel:#FBFAF6; --inset:#ECEAE2; --ink:#1A1A1A;
  --dim:#888780; --line:#D8D6D1; --line2:#C4C2BB; --acc:#D85A30;
  --wave-off:#C9C7C0; --sig:#1F9E5A; --sig-dim:#1F9E5A55;
  /* tactile hardware lighting (light console) */
  --hi:rgba(255,255,255,0.9); --lo:rgba(120,116,104,0.35);
  --btn-top:#FCFBF8; --btn-bot:#E3E0D8; --well:#E6E3DB;
}
[data-theme="live"]{
  --bg:#141414; --panel:#191919; --inset:#0A0A0A; --ink:#DEDEDE;
  --dim:#777; --line:#2A2A2A; --line2:#3A3A3A; --acc:#E24B4A;
  --wave-off:#3A3A3A; --sig:#3BF089; --sig-dim:#3BF08944;
  /* tactile hardware lighting (dark console) */
  --hi:rgba(255,255,255,0.07); --lo:rgba(0,0,0,0.6);
  --btn-top:#242424; --btn-bot:#0E0E0E; --well:#0C0C0C;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:13px; line-height:1.5;
  transition:background .25s,color .25s;
  display:flex; justify-content:center; min-height:100vh;
}
button{font-family:inherit; cursor:pointer;}
.app{width:100%; max-width:430px; padding:14px 14px 40px;}

.statusbar{display:flex; justify-content:space-between; align-items:center;
  padding:4px 4px 14px; font-size:11px; letter-spacing:.16em;}
.statusbar .brand{font-weight:700;}
.onair{display:flex; align-items:center; gap:6px; color:var(--dim);}
.onair.live{color:var(--acc);}
.onair .dot{width:7px; height:7px; border-radius:50%; background:currentColor;}
.onair.live .dot{animation:pulse 1.1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.mode{color:var(--dim); border:1px solid var(--line2);
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:0 1px 2px var(--lo), inset 0 1px 0 var(--hi);
  border-radius:6px; padding:3px 9px; font-size:11px; letter-spacing:.1em;
  transition:box-shadow .08s, transform .08s;}
.mode:active{transform:translateY(1px);
  box-shadow:inset 0 2px 3px var(--lo), inset 0 -1px 0 var(--hi);}

.screen{background:var(--well); border:1px solid var(--line); border-radius:14px;
  box-shadow:inset 0 2px 6px var(--lo), inset 0 -1px 0 var(--hi);
  padding:14px; display:flex; gap:14px; min-height:104px;}
.cover{width:74px; height:74px; flex:none; border-radius:6px; border:1px solid var(--line2);
  background:var(--panel); object-fit:cover; display:block;
  box-shadow:inset 0 1px 2px var(--lo);}
.coverph{width:74px; height:74px; flex:none; border-radius:6px; border:1px solid var(--line2);
  background:var(--well); box-shadow:inset 0 1px 3px var(--lo);
  display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:11px;}
.nowmeta{min-width:0; flex:1;}
.livebadge{font-size:11px; letter-spacing:.1em; color:var(--acc);}
.title{font-size:15px; letter-spacing:.04em; margin-top:3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.artist{font-size:11px; color:var(--dim); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.artist a{color:inherit;}
.meterrow{display:flex; align-items:center; gap:6px; margin-top:9px; font-size:11px; color:var(--dim);}
.meter{display:flex; align-items:flex-end; gap:1px; height:13px; flex:1; max-width:120px;}
.meter span{width:2px; background:var(--wave-off); display:block; transition:background .08s;}
.meter span.on{background:var(--ink);}
.db{margin-left:auto; color:var(--ink);}

.wavebox{padding:14px 2px 0;}
.wave{display:block; width:100%; height:36px; cursor:pointer;}
.timerow{display:flex; justify-content:space-between; font-size:11px; color:var(--dim); padding:2px 2px 0;}
.timerow .cur{color:var(--ink);}

.tabs{display:flex; gap:8px; padding:14px 2px;}
.tab{border:1px solid var(--line2); color:var(--dim);
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:0 1px 2px var(--lo), inset 0 1px 0 var(--hi);
  border-radius:7px; padding:6px 14px; font-size:11px; letter-spacing:.12em;
  transition:box-shadow .08s, transform .08s, color .08s;}
.tab:active{transform:translateY(1px);
  box-shadow:inset 0 2px 3px var(--lo), inset 0 -1px 0 var(--hi);}
.tab.act{color:var(--ink); border-color:var(--line2);
  background:linear-gradient(180deg,var(--btn-bot),var(--btn-top));
  box-shadow:inset 0 2px 4px var(--lo), inset 0 -1px 0 var(--hi);}
.searchwrap{margin-left:auto; display:flex; gap:6px;}
.searchwrap input{border:1px solid var(--line2); background:var(--well); color:var(--ink);
  box-shadow:inset 0 2px 4px var(--lo), inset 0 -1px 0 var(--hi);
  border-radius:7px; padding:6px 9px; font-size:12px; width:104px; font-family:inherit; outline:none;}
.searchwrap input::placeholder{color:var(--dim);}

.deck{background:var(--panel); border:1px solid var(--line); border-radius:20px;
  padding:18px 16px; display:flex; align-items:center; gap:16px;}
.sidebtns{display:flex; flex-direction:column; gap:14px;}

/* tactile side buttons (stop / collect) — convex hardware keys */
.rbtn{width:48px; height:48px; border-radius:50%; color:var(--ink);
  border:1px solid var(--line2);
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:
    0 2px 4px var(--lo),
    inset 0 1px 0 var(--hi),
    inset 0 -1px 2px var(--lo);
  display:flex; align-items:center; justify-content:center; font-size:17px;
  transition:box-shadow .08s, transform .08s;}
.rbtn:active{
  transform:translateY(1px);
  box-shadow:
    0 1px 2px var(--lo),
    inset 0 2px 4px var(--lo),
    inset 0 -1px 0 var(--hi);}
.rbtn.heart{color:var(--acc);}

/* the wheel — a recessed well that the play key sits inside */
.wheel{flex:1; aspect-ratio:1; max-width:184px; margin:0 auto; border-radius:50%;
  position:relative; border:1px solid var(--line2);
  background:radial-gradient(circle at 50% 38%, var(--inset), var(--well));
  box-shadow:
    inset 0 2px 6px var(--lo),
    inset 0 -1px 0 var(--hi),
    0 1px 0 var(--hi);}
.wbtn{position:absolute; background:none; border:none; color:var(--ink);
  font-size:17px; padding:10px; line-height:1;
  transition:transform .08s, color .08s; border-radius:8px;}
.wbtn:active{color:var(--acc); transform:scale(.9);}
.wbtn.prev{left:6px; top:50%; transform:translateY(-50%);}
.wbtn.next{right:6px; top:50%; transform:translateY(-50%);}
.wbtn.up{top:6px; left:50%; transform:translateX(-50%); color:var(--dim);}
.wbtn.down{bottom:6px; left:50%; transform:translateX(-50%); color:var(--dim);}
.wbtn.prev:active{transform:translateY(-50%) scale(.9);}
.wbtn.next:active{transform:translateY(-50%) scale(.9);}
.wbtn.up:active{transform:translateX(-50%) scale(.9);}
.wbtn.down:active{transform:translateX(-50%) scale(.9);}

/* center play key — the prominent convex button */
.playbtn{position:absolute; inset:0; margin:auto; width:68px; height:68px; border-radius:50%;
  color:var(--ink); border:1px solid var(--line2);
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:
    0 3px 6px var(--lo),
    0 1px 0 var(--hi),
    inset 0 1px 0 var(--hi),
    inset 0 -2px 3px var(--lo);
  display:flex; align-items:center; justify-content:center; font-size:21px;
  transition:box-shadow .09s, transform .09s;}
.playbtn:active{
  transform:translateY(1.5px);
  box-shadow:
    0 1px 2px var(--lo),
    inset 0 3px 6px var(--lo),
    inset 0 -1px 0 var(--hi);}


.listhead{display:flex; justify-content:space-between; align-items:baseline;
  padding:22px 4px 8px; font-size:11px; letter-spacing:.14em; color:var(--dim);}

.vizbox{position:relative; margin-top:14px; height:150px; border:1px solid var(--line);
  border-radius:14px; background:var(--well); overflow:hidden;
  box-shadow:inset 0 2px 6px var(--lo), inset 0 -1px 0 var(--hi);}
.stationbar{display:none; gap:6px; margin-top:14px; padding-bottom:2px;
  overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.stationbar::-webkit-scrollbar{display:none;}
.stationbar.show{display:flex;}
.stbtn{flex:none; border:1px solid var(--line2); color:var(--dim);
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:0 1px 2px var(--lo), inset 0 1px 0 var(--hi);
  border-radius:6px; padding:5px 10px; font-size:10px; letter-spacing:.06em;
  white-space:nowrap; font-family:inherit;
  transition:box-shadow .08s, transform .08s, color .08s;}
.stbtn:active{transform:translateY(1px);
  box-shadow:inset 0 2px 3px var(--lo), inset 0 -1px 0 var(--hi);}
.stbtn b{color:var(--ink); font-weight:600;}
.stbtn.act{border-color:var(--sig); color:var(--sig);
  background:linear-gradient(180deg,var(--btn-bot),var(--btn-top));
  box-shadow:inset 0 2px 4px var(--lo), inset 0 -1px 0 var(--hi);}
.stbtn.act b{color:var(--sig);}
.vizbox canvas{display:block; width:100%; height:100%;}
.vizlabel{position:absolute; top:9px; left:12px; font-size:10px; letter-spacing:.16em;
  color:var(--dim); pointer-events:none;}
.vizsrc{position:absolute; bottom:8px; right:12px; font-size:9px; letter-spacing:.1em;
  color:var(--dim); pointer-events:none;}
.vizbox.graph{height:240px; cursor:crosshair;}
.tracklist{border-top:1.5px solid var(--ink);}
.trk{display:flex; align-items:center; gap:10px; padding:10px 4px;
  border-bottom:1px solid var(--line); cursor:pointer;}
.trk .ix{width:34px; flex:none; color:var(--dim); font-size:11px;}
.trk .nm{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.trk .by{color:var(--dim); font-size:11px; flex:none; max-width:110px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.trk.now{color:var(--acc);}
.trk.now .by,.trk.now .ix{color:var(--acc);}
.more{display:block; margin:18px auto 0; border:1px solid var(--line2);
  color:var(--ink); background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  box-shadow:0 1px 3px var(--lo), inset 0 1px 0 var(--hi);
  padding:9px 26px; font-size:11px; letter-spacing:.14em; border-radius:7px;
  transition:box-shadow .08s, transform .08s;}
.more:active{transform:translateY(1px);
  box-shadow:inset 0 2px 4px var(--lo), inset 0 -1px 0 var(--hi);}
.note{padding:16px 4px; color:var(--dim); font-size:12px;}
.note.err{color:var(--acc);}
.foot{padding:26px 4px 0; font-size:11px; color:var(--dim); letter-spacing:.04em;}
.foot a{color:inherit;}
@media (prefers-reduced-motion:reduce){.onair.live .dot{animation:none;}}
</style>
</head>
<body>
<div class="app">

  <div class="statusbar">
    <span class="brand">TEIA&nbsp;RADIO</span>
    <span class="onair" id="onair"><span class="dot"></span><span id="onairTxt">STANDBY</span></span>
    <button class="mode" id="modeBtn">LIVE&nbsp;MODE</button>
  </div>

  <div class="screen">
    <span class="coverph" id="coverph">objkt</span>
    <img class="cover" id="cover" alt="" style="display:none">
    <div class="nowmeta">
      <span class="livebadge" id="badge">&#9679; TUNED</span>
      <div class="title" id="nowTitle">awaiting transmission</div>
      <div class="artist" id="nowArtist">select a track below</div>
      <div class="meterrow">
        <span>L</span><span class="meter" id="meter"></span><span>R</span>
        <span class="db" id="db">&ndash;&ndash;dB</span>
      </div>
    </div>
  </div>

  <div class="wavebox">
    <svg class="wave" id="wave" viewBox="0 0 400 36" preserveAspectRatio="none"></svg>
    <div class="timerow"><span class="cur" id="tCur">0:00</span><span id="tDur">&ndash;:&ndash;&ndash;</span></div>
  </div>

  <div class="tabs">
    <button class="tab act" id="tabLatest">LATEST</button>
    <button class="tab" id="tabPop">COLLECTED</button>
    <button class="tab" id="tabGraph">GRAPH</button>
    <span class="searchwrap">
      <input id="q" placeholder="search" enterkeyhint="search">
    </span>
  </div>

  <div class="deck">
    <div class="sidebtns">
      <button class="rbtn" id="stopBtn" aria-label="Stop">&#9632;</button>
      <button class="rbtn heart" id="heartBtn" aria-label="Collect on Teia">&#9825;</button>
    </div>
    <div class="wheel">
      <button class="wbtn up" id="upBtn" aria-label="Scroll up">&#9650;</button>
      <button class="wbtn down" id="downBtn" aria-label="Scroll down">&#9660;</button>
      <button class="wbtn prev" id="prevBtn" aria-label="Previous">&#9198;</button>
      <button class="wbtn next" id="nextBtn" aria-label="Next">&#9197;</button>
      <button class="playbtn" id="playBtn" aria-label="Play or pause">&#9654;</button>
    </div>
  </div>

  <div class="stationbar" id="stationbar"></div>
  <div class="vizbox" id="vizbox">
    <canvas id="viz"></canvas>
    <div class="vizlabel" id="vizLabel">SPECTRUM</div>
    <div class="vizsrc" id="vizSrc"></div>
  </div>

  <div class="listhead"><span id="listLabel">FREQUENCY BAND &mdash; LATEST</span><span id="listCount"></span></div>
  <div class="tracklist" id="list"></div>
  <div class="note" id="status">tuning indexer&hellip;</div>
  <button class="more" id="moreBtn" style="display:none">LOAD MORE</button>

  <div class="foot">
    a community listening instrument for <a href="https://teia.art" target="_blank" rel="noreferrer">teia.art</a>
    &middot; data: teztok &middot; restricted accounts filtered per teia governance
  </div>
</div>

<audio id="audio" preload="auto" crossorigin="anonymous"></audio>

<script>
"use strict";
var API = "https://teztok.teia.art/v1/graphql";
var FA2 = "KT1RJ6PbjHpwc3M5rw5s2Nbmefwbuwbdxton";
var RESTRICTED = "https://raw.githubusercontent.com/teia-community/teia-report/main/restricted.json";
var GATEWAYS = ["https://ipfs.io/ipfs/","https://dweb.link/ipfs/","https://gateway.pinata.cloud/ipfs/"];
var PAGE = 30;

var state = {
  tab:"latest", search:"", offset:0, tracks:[], done:false, loading:false,
  cur:null, gwIdx:0, restricted:null, meterTimer:null
};

var $ = function(id){ return document.getElementById(id); };
var audio = $("audio");

function esc(s){ var d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }
function shortAddr(a){ return a ? "\u2026"+a.slice(-4) : ""; }
function artistName(t){ return (t.artist_profile && t.artist_profile.name) || shortAddr(t.artist_address); }
function cid(uri){ return uri ? uri.replace("ipfs://","") : null; }
function fmt(s){ if(!isFinite(s)) return "\u2013:\u2013\u2013"; var m=Math.floor(s/60), x=Math.floor(s%60); return m+":"+(x<10?"0":"")+x; }

function gql(tab, search, offset){
  var conds = 'fa2_address: {_eq: "'+FA2+'"}, mime_type: {_like: "audio/%"}, editions: {_gt: 0}';
  if(search){ conds += ', name: {_ilike: "%'+search.replace(/["\\\\]/g,"")+'%"}'; }
  var order = tab==="popular" ? "{sales_count: desc}" : "{minted_at: desc}";
  return "{ tokens(where: {"+conds+"}, order_by: "+order+", limit: "+PAGE+", offset: "+offset+") {"+
    " token_id name artist_address artist_profile { name } artifact_uri display_uri thumbnail_uri"+
    " mime_type editions sales_count minted_at } }";
}

fetch(RESTRICTED).then(function(r){return r.json();}).then(function(d){
  state.restricted = new Set(Array.isArray(d)?d:Object.keys(d));
  renderList();
}).catch(function(){ state.restricted = new Set(); });

function load(append){
  state.loading = true;
  $("status").textContent = "tuning indexer\u2026"; $("status").className="note";
  fetch(API, {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({query: gql(state.tab, state.search, state.offset)})})
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.errors) throw new Error(j.errors[0].message);
    var batch = j.data.tokens.filter(function(t){return t.artifact_uri;});
    state.done = batch.length < PAGE;
    state.tracks = append ? state.tracks.concat(batch) : batch;
    state.loading = false;
    $("status").textContent = "";
    renderList();
  })
  .catch(function(e){
    state.loading = false;
    $("status").textContent = "signal lost: "+e.message; $("status").className="note err";
  });
}

function visibleTracks(){
  if(state.tab==="graph"){ return state.graphTracks || []; }
  if(!state.restricted) return state.tracks;
  return state.tracks.filter(function(t){ return !state.restricted.has(t.artist_address); });
}

function renderList(){
  var v = visibleTracks();
  var html = "";
  for(var i=0;i<v.length;i++){
    var t = v[i];
    var now = state.cur && state.cur.token_id === t.token_id;
    html += '<div class="trk'+(now?" now":"")+'" data-id="'+t.token_id+'">'+
      '<span class="ix">'+(now?"\u25B8":String(i+1).padStart(2,"0"))+'</span>'+
      '<span class="nm">'+esc(t.name||("untitled #"+t.token_id))+'</span>'+
      '<span class="by">'+esc(artistName(t))+'</span></div>';
  }
  $("list").innerHTML = html;
  $("listCount").textContent = v.length ? v.length+" SIGNALS" : "";
  $("moreBtn").style.display = (state.tab!=="graph" && !state.done && v.length) ? "block" : "none";
  if(!v.length && !state.loading && !$("status").textContent){
    $("status").textContent = "no audio works found on this band.";
  }
  var rows = $("list").querySelectorAll(".trk");
  for(var k=0;k<rows.length;k++){
    rows[k].onclick = (function(id){ return function(){
      var t = visibleTracks().find(function(x){return x.token_id===id;});
      if(state.cur && state.cur.token_id===id){ togglePlay(); } else if(t){ playTrack(t); }
    };})(rows[k].getAttribute("data-id"));
  }
}

function gatewayUrl(uri, gw){ return GATEWAYS[gw] + cid(uri); }

function playTrack(t){
  state.cur = t; state.gwIdx = 0;
  ensureAudioGraph();
  audio.src = gatewayUrl(t.artifact_uri, 0);
  audio.play().catch(function(){});
  updateNow(); drawWave(); renderList(); updateMediaSession();
}

audio.addEventListener("error", function(){
  if(!state.cur) return;
  if(state.gwIdx < GATEWAYS.length-1){
    state.gwIdx++;
    var pos = audio.currentTime;
    audio.src = gatewayUrl(state.cur.artifact_uri, state.gwIdx);
    audio.play().then(function(){ if(pos>1) audio.currentTime = pos; }).catch(function(){});
  } else {
    step(1);
  }
});

function updateNow(){
  var t = state.cur;
  if(!t) return;
  $("nowTitle").textContent = t.name || "untitled #"+t.token_id;
  $("nowArtist").innerHTML = esc(artistName(t)) +
    ' &middot; <a href="https://teia.art/objkt/'+t.token_id+'" target="_blank" rel="noreferrer">OBJKT #'+esc(t.token_id)+'</a>';
  $("badge").innerHTML = "&#9679; LIVE";
  var thumb = t.display_uri || t.thumbnail_uri;
  if(thumb){
    $("cover").src = GATEWAYS[0] + cid(thumb);
    $("cover").style.display = "block"; $("coverph").style.display = "none";
    $("cover").onerror = function(){ this.style.display="none"; $("coverph").style.display="flex"; };
  } else {
    $("cover").style.display = "none"; $("coverph").style.display = "flex";
  }
}

// Progress line — a single quiet rail with a played segment and a red playhead.
// The old decorative pseudo-waveform is gone; real-time amplitude lives in the green bars.
function drawWave(){ paintWave(0); }
function paintWave(frac){
  var svg = $("wave"), w = 400, mid = 18, html = "";
  // base rail
  html += '<line x1="2" y1="'+mid+'" x2="'+(w-2)+'" y2="'+mid+'" stroke="var(--wave-off)" stroke-width="2"/>';
  if(state.cur){
    var px = Math.max(2, Math.min(w-2, frac*w));
    // played segment
    html += '<line x1="2" y1="'+mid+'" x2="'+px+'" y2="'+mid+'" stroke="var(--ink)" stroke-width="2"/>';
    // playhead
    html += '<line x1="'+px+'" y1="4" x2="'+px+'" y2="32" stroke="var(--acc)" stroke-width="2"/>';
  }
  svg.innerHTML = html;
}
drawWave();

$("wave").addEventListener("click", function(e){
  if(!state.cur || !isFinite(audio.duration)) return;
  var r = this.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left)/r.width) * audio.duration;
});

audio.addEventListener("timeupdate", function(){
  $("tCur").textContent = fmt(audio.currentTime);
  if(isFinite(audio.duration)){
    $("tDur").textContent = fmt(audio.duration);
    paintWave(audio.currentTime/audio.duration);
  }
});
audio.addEventListener("ended", function(){ step(1); });
audio.addEventListener("play", setPlaying);
audio.addEventListener("pause", setPaused);

function setPlaying(){
  $("playBtn").innerHTML = "&#10074;&#10074;";
  $("onair").className = "onair live"; $("onairTxt").textContent = "ON AIR";
  startMeter();
}
function setPaused(){
  $("playBtn").innerHTML = "&#9654;";
  $("onair").className = "onair"; $("onairTxt").textContent = "STANDBY";
  stopMeter();
}

function togglePlay(){
  if(!state.cur){ var v = visibleTracks(); if(v.length) playTrack(v[0]); return; }
  if(audio.paused) audio.play(); else audio.pause();
}
function step(dir){
  var v = visibleTracks();
  if(!v.length) return;
  if(!state.cur){ playTrack(v[0]); return; }
  var i = v.findIndex(function(t){return t.token_id===state.cur.token_id;});
  var nx = v[i+dir];
  if(nx) playTrack(nx);
  else if(dir===1 && !state.done){ $("moreBtn").click(); }
}

// Static level label — real-time amplitude is handled exclusively by the green bars below.
// The L/R meter is now a fixed "console" detail: a steady silhouette, not a live readout.
var meterEl = $("meter");
(function(){
  var h="";
  for(var i=0;i<26;i++){
    var on = i < 16;                 // fixed silhouette
    h+='<span class="'+(on?"on":"")+'" style="height:'+(5+(i%4)*3)+'px"></span>';
  }
  meterEl.innerHTML=h;
  $("db").textContent = "-6dB";        // static reference level
})();
function startMeter(){}   // no-op: meter is static
function stopMeter(){}

function updateMediaSession(){
  if(!("mediaSession" in navigator) || !state.cur) return;
  var t = state.cur;
  var art = [];
  var thumb = t.display_uri || t.thumbnail_uri;
  if(thumb) art.push({src: GATEWAYS[0]+cid(thumb), sizes:"512x512"});
  navigator.mediaSession.metadata = new MediaMetadata({
    title: t.name || "untitled #"+t.token_id,
    artist: artistName(t),
    album: "Teia Radio",
    artwork: art
  });
  navigator.mediaSession.setActionHandler("play", function(){ audio.play(); });
  navigator.mediaSession.setActionHandler("pause", function(){ audio.pause(); });
  navigator.mediaSession.setActionHandler("previoustrack", function(){ step(-1); });
  navigator.mediaSession.setActionHandler("nexttrack", function(){ step(1); });
}

$("playBtn").onclick = togglePlay;
$("prevBtn").onclick = function(){ step(-1); };
$("nextBtn").onclick = function(){ step(1); };
$("stopBtn").onclick = function(){ audio.pause(); audio.currentTime = 0; paintWave(0); };
$("heartBtn").onclick = function(){

};
$("upBtn").onclick = function(){
  if(VZ.mode==="graph"){ selectStation(VZ.stationIdx-1); }
  else window.scrollBy({top:-260, behavior:"smooth"});
};
$("downBtn").onclick = function(){
  if(VZ.mode==="graph"){ selectStation(VZ.stationIdx+1); }
  else window.scrollBy({top:260, behavior:"smooth"});
};

function setTab(tab){
  state.tab = tab; state.offset = 0; state.done = false;
  $("tabLatest").className = "tab"+(tab==="latest"?" act":"");
  $("tabPop").className = "tab"+(tab==="popular"?" act":"");
  $("tabGraph").className = "tab"+(tab==="graph"?" act":"");
  if(tab==="graph"){
    enterGraph();
    return;
  }
  exitGraph();
  $("listLabel").textContent = "FREQUENCY BAND \u2014 "+(tab==="latest"?"LATEST":"MOST COLLECTED");
  load(false);
}
$("tabLatest").onclick = function(){ setTab("latest"); };
$("tabPop").onclick = function(){ setTab("popular"); };
$("tabGraph").onclick = function(){ setTab("graph"); };
$("q").addEventListener("keydown", function(e){
  if(e.key==="Enter"){ state.search=this.value.trim(); state.offset=0; load(false); }
});
$("moreBtn").onclick = function(){
  state.offset += PAGE; load(true);
};

  try{ localStorage.setItem("teia-radio-theme", live?"":"live"); }catch(e){}
};

var VZ = {

  raf:null, mode:"spectrum",          // "spectrum" (green bars) | "graph" (star map)

function vzResize(){
  var c = VZ.canvas; if(!c) return;
  var r = c.parentNode.getBoundingClientRect();
  VZ.dpr = Math.min(2, window.devicePixelRatio||1);
  VZ.w = r.width; VZ.h = r.height;
  c.width = Math.round(VZ.w*VZ.dpr); c.height = Math.round(VZ.h*VZ.dpr);
  VZ.ctx.setTransform(VZ.dpr,0,0,VZ.dpr,0,0);
  if(VZ.mode==="graph") layoutStation();
}

function vzInit(){
  VZ.canvas = $("viz"); VZ.ctx = VZ.canvas.getContext("2d");
  vzResize();
  window.addEventListener("resize", vzResize);
  vzLoop();
}

// Lazily wire Web Audio once the user starts playback (autoplay policy safe).
function ensureAudioGraph(){
  if(VZ.actx) return;
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    VZ.actx = new AC();
    VZ.srcNode = VZ.actx.createMediaElementSource(audio);
    VZ.analyser = VZ.actx.createAnalyser();
    VZ.analyser.fftSize = 128;
    VZ.analyser.smoothingTimeConstant = 0.78;
    VZ.srcNode.connect(VZ.analyser);
    VZ.analyser.connect(VZ.actx.destination);
    VZ.freq = new Uint8Array(VZ.analyser.frequencyBinCount);
  }catch(e){ VZ.actx = null; } // tainted/cross-origin → stay on synthetic
}

// Returns a Float array (length n) of 0..1 magnitudes.
// A: real FFT if available & non-silent. B: synthetic envelope otherwise.
function readSpectrum(n){
  var out = new Array(n), i;
  var playing = !audio.paused && audio.currentTime>0;
  if(VZ.actx && VZ.analyser && !VZ.fellBack){
    try{ VZ.actx.state==="suspended" && VZ.actx.resume(); }catch(e){}
    VZ.analyser.getByteFrequencyData(VZ.freq);
    var sum=0, bins=VZ.freq.length;
    for(i=0;i<n;i++){
      var idx = Math.floor(i/n*bins);
      var v = VZ.freq[idx]/255; out[i]=v; sum+=VZ.freq[idx];
    }
    if(playing){
      // CORS-tainted sources read as constant 0 → detect & fall back (B)
      if(sum===0){ VZ.zeroRun++; if(VZ.zeroRun>25){ VZ.fellBack=true; } }
      else VZ.zeroRun=0;
    }
    if(!VZ.fellBack) return out;
  }
  // ---- B: synthetic envelope (always animated, CORS-proof) ----
  if(!playing){ for(i=0;i<n;i++) out[i]=0; return out; }
  var t = audio.currentTime;
  for(i=0;i<n;i++){
    var f = 0.5 + i*0.27;
    var a = 0.5 + 0.5*Math.sin(t*f*2.0 + i*1.3);
    var b = 0.5 + 0.5*Math.sin(t*(1.7+i*0.11) + i*0.7);
    var env = 0.45 + 0.4*Math.sin(t*1.3 + i*0.2);
    out[i] = Math.max(0, Math.min(1, (a*0.6 + b*0.4) * env * (1 - i/n*0.35)));
  }
  return out;
}

function vzLoop(){
  VZ.raf = requestAnimationFrame(vzLoop);
  var ctx = VZ.ctx; if(!ctx) return;
  ctx.clearRect(0,0,VZ.w,VZ.h);
  var spec = readSpectrum(VZ.mode==="graph" ? 24 : 48);
  // smoothed overall level drives the graph pulse
  var lvl=0; for(var i=0;i<spec.length;i++) lvl+=spec[i];
  lvl/=spec.length;
  VZ.level += (lvl - VZ.level)*0.25;
  if(VZ.mode==="graph") drawStars(spec); else drawBars(spec);
}

function cssVar(name){ return getComputedStyle(document.body).getPropertyValue(name).trim(); }

/* ---- SPECTRUM: classic green bars ---- */
function drawBars(spec){
  var ctx=VZ.ctx, n=spec.length, W=VZ.w, H=VZ.h;
  var pad=14, bw=(W-pad*2)/n, gap=bw*0.34, base=H-18;
  var sig=cssVar("--sig"), dim=cssVar("--sig-dim");
  for(var i=0;i<n;i++){
    var h=Math.max(2, spec[i]*(H-40));
    var x=pad+i*bw, y=base-h;
    ctx.fillStyle = spec[i]>0.04 ? sig : dim;
    ctx.fillRect(x, y, bw-gap, h);
    // mirrored faint reflection for "instrument" feel
    ctx.fillStyle = dim;
    ctx.fillRect(x, base+1, bw-gap, Math.min(6, h*0.18));
  }
}

/* ---- GRAPH: star map ---- */
function layoutStation(){
  var s=VZ.station; if(!s) return;
  var W=VZ.w, H=VZ.h, N=s.N, L=s.L, byId={};
  var P=N.map(function(m,i){
    return {id:m[0], name:m[1], tr:m[2],
      x:W/2+(Math.cos(i/N.length*6.28)* (W*0.3))+ (Math.random()-0.5)*40,
      y:H/2+(Math.sin(i/N.length*6.28)* (H*0.3))+ (Math.random()-0.5)*40,
      vx:0, vy:0};
  });
  P.forEach(function(p){ byId[p.id]=p; });
  var links=L.filter(function(l){return byId[l[0]]&&byId[l[1]];});
  for(var it=0; it<200; it++){
    for(var a=0;a<P.length;a++)for(var b=a+1;b<P.length;b++){
      var dx=P[a].x-P[b].x, dy=P[a].y-P[b].y, d2=dx*dx+dy*dy+0.01, d=Math.sqrt(d2);
      var f=1400/d2, fx=dx/d*f, fy=dy/d*f;
      P[a].vx+=fx;P[a].vy+=fy;P[b].vx-=fx;P[b].vy-=fy;
    }
    links.forEach(function(l){
      var A=byId[l[0]],B=byId[l[1]],dx=B.x-A.x,dy=B.y-A.y,d=Math.sqrt(dx*dx+dy*dy)+0.01;
      var f=(d-64)*0.02*Math.min(3,l[2]), fx=dx/d*f, fy=dy/d*f;
      A.vx+=fx;A.vy+=fy;B.vx-=fx;B.vy-=fy;
    });
    P.forEach(function(p){
      p.vx+=(W/2-p.x)*0.004; p.vy+=(H/2-p.y)*0.004;
      p.x+=p.vx*0.5; p.y+=p.vy*0.5; p.vx*=0.8; p.vy*=0.8;
      p.x=Math.max(18,Math.min(W-18,p.x)); p.y=Math.max(26,Math.min(H-14,p.y));
    });
  }
  VZ.nodes=P; VZ.byId=byId; VZ.links=links;
  VZ.starPhase=P.map(function(){ return Math.random()*6.28; });
}

function drawStars(spec){

  }
  ctx.globalAlpha=1;
  // nodes
  for(var k=0;k<P.length;k++){
    var p=P[k];
    var twinkle = 0.55 + 0.45*Math.sin(t*1.4 + VZ.starPhase[k]); // base star shimmer
    var bright = Math.min(1, twinkle*0.5 + beat*0.7);
    var r = 2.2 + Math.sqrt(p.tr)*0.7;
    // glow
    var g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4);
    g.addColorStop(0, hexA(sig, 0.5*bright));
    g.addColorStop(1, hexA(sig, 0));
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(p.x,p.y,r*4,0,6.2832); ctx.fill();
    // core
    ctx.fillStyle=hexA(sig, 0.5+0.5*bright);
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,6.2832); ctx.fill();
    // label for larger nodes
    if(p.tr>=4){
      ctx.fillStyle=hexA(cssVar("--ink"),0.55);
      ctx.font='9px ui-monospace,monospace';
      ctx.fillText(p.name.slice(0,14), p.x+r+3, p.y+3);
    }
  }
}

function hexA(hex, a){
  hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// click a star → switch queue to that creator
$("viz").addEventListener("click", function(e){
  if(VZ.mode!=="graph" || !VZ.nodes.length) return;
  var r=this.getBoundingClientRect();
  var mx=(e.clientX-r.left), my=(e.clientY-r.top), best=null, bd=1e9;
  VZ.nodes.forEach(function(p){
    var d=(p.x-mx)*(p.x-mx)+(p.y-my)*(p.y-my);
    if(d<bd){bd=d;best=p;}
  });
  if(best && bd< 26*26){ enterCreator(best.id); }
});

/* ===== GRAPH MODE: queue from station, tab wiring ===== */
function buildStationQueue(s){
  // map station tracks into the player's track shape; rebuild gateway URL from CID
  return s.T.map(function(a){
    return {
      token_id:a[0], name:a[1], artist_address:a[2],
      artist_profile:{name:a[3]},
      artifact_uri:"ipfs://"+a[4],
      display_uri:a[5]?("ipfs://"+a[5]):null,
      thumbnail_uri:a[5]?("ipfs://"+a[5]):null,
      _station:true
    };
  });
}

function stationIndexForCurrent(){
  // largest station (#0) by default; if current artist is in a station, that one
  if(state.cur && state.cur.artist_address){
    for(var i=0;i<GRAPH.st.length;i++){
      var nodes=GRAPH.st[i].N;
      for(var j=0;j<nodes.length;j++){ if(nodes[j][0]===state.cur.artist_address) return i; }
    }
  }
  return 0; // GRAPH.st is sorted largest-first
}

function renderStationBar(){
  var bar=$("stationbar"), html="";
  for(var i=0;i<GRAPH.st.length;i++){
    var s=GRAPH.st[i], act=(i===VZ.stationIdx);
    html+='<button class="stbtn'+(act?" act":"")+'" data-si="'+i+'">'+
      esc(s.l)+' &nbsp;<b>'+s.s+'</b></button>';
  }
  bar.innerHTML=html;
  var btns=bar.querySelectorAll(".stbtn");
  for(var k=0;k<btns.length;k++){
    btns[k].onclick=(function(idx){ return function(){ selectStation(idx); }; })(+btns[k].getAttribute("data-si"));
  }
  // scroll active into view
  var a=bar.querySelector(".stbtn.act");
  if(a) a.scrollIntoView({inline:"center", block:"nearest", behavior:"smooth"});
}

function selectStation(idx){
  if(idx<0) idx=GRAPH.st.length-1;
  if(idx>=GRAPH.st.length) idx=0;
  VZ.stationIdx=idx;
  VZ.station=GRAPH.st[idx];
  $("vizLabel").textContent = "COLLECTIVE \u2014 "+VZ.station.l;
  $("vizSrc").textContent = VZ.station.s+" creators \u00b7 "+VZ.station.L.length+" mutual links";
  layoutStation();
  state.graphTracks = buildStationQueue(VZ.station);
  $("listLabel").textContent = "COLLECTIVE \u2014 "+VZ.station.l.toUpperCase();
  renderStationBar();
  renderList();
}

function enterGraph(){
  VZ.mode="graph";
  $("vizbox").classList.add("graph");
  $("stationbar").classList.add("show");
  vzResize();
  selectStation(stationIndexForCurrent());
}
function exitGraph(){
  VZ.mode="spectrum"; $("vizbox").classList.remove("graph");
  $("stationbar").classList.remove("show");
  $("vizLabel").textContent="SPECTRUM"; $("vizSrc").textContent="";
  vzResize();
}
function enterCreator(addr){
  if(VZ.mode!=="graph") return;
  // reorder queue so this creator's tracks come first, dim others
  var all = state.graphTracks||[];
  var own=all.filter(function(t){return t.artist_address===addr;});
  var rest=all.filter(function(t){return t.artist_address!==addr;});
  state.graphTracks = own.concat(rest);
  renderList();
  if(own.length) playTrack(own[0]);
}

vzInit();

load(false);
</script>
</body>
